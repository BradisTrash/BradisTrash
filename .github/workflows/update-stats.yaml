name: Generate Static GitHub Stats

on:
  schedule:
    # Runs at midnight every day to refresh your stats
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Main Stats Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&show_icons=true'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&layout=compact'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push SVGs
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "chore: update local github stats" || echo "No changes to commit"
          git push